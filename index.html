<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geografia Teste Grátis - Gabarito Max</title>
  <style>
    :root{
      --bg:#05070c;
      --card:#11141b;
      --card2:#171b24;
      --blue:#00f3ff;
      --pink:#ff00e6;
      --green:#39ff14;
      --red:#ff003c;
      --yellow:#ffd400;
      --text:#ffffff;
      --muted:#cfcfcf;
      --line:rgba(255,255,255,.08);
      --lock:#6b7280;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      background:#000;
      color:var(--text);
      min-height:100vh;
      padding:20px 12px 40px;
      text-align:center;
      overflow-x:hidden;
    }

    header{
      max-width:1100px;
      margin:0 auto 24px;
      border:2px solid var(--blue);
      border-radius:24px;
      padding:22px 16px;
      background:linear-gradient(180deg,#0c0f16,#090b11);
      box-shadow:0 0 22px rgba(0,243,255,.22);
    }

    header h1{
      color:var(--blue);
      font-size:clamp(2rem,4vw,3rem);
      text-shadow:0 0 14px rgba(0,243,255,.7);
      font-weight:900;
    }

    header p{
      margin-top:10px;
      color:var(--pink);
      font-weight:800;
      font-size:clamp(1rem,2vw,1.3rem);
    }

    #app{
      width:100%;
      max-width:1100px;
      margin:0 auto;
    }

    .box{
      width:100%;
      max-width:100%;
      background:linear-gradient(180deg,var(--card),var(--card2));
      border:1px solid var(--line);
      border-radius:20px;
      padding:20px 16px;
      box-shadow:0 0 20px rgba(0,0,0,.35);
      overflow:hidden;
    }

    .btn{
      display:block;
      width:100%;
      max-width:560px;
      margin:10px auto;
      padding:14px 16px;
      border:2px solid var(--blue);
      background:transparent;
      color:#fff;
      border-radius:12px;
      cursor:pointer;
      font-weight:800;
      font-size:1rem;
      line-height:1.45;
      transition:.2s;
      white-space:normal;
      word-break:break-word;
      overflow-wrap:anywhere;
    }

    .btn:hover:not(:disabled){
      background:var(--blue);
      color:#000;
      box-shadow:0 0 18px rgba(0,243,255,.35);
    }

    .btn-lock{
      border-color:var(--lock);
      color:#d1d5db;
      background:rgba(255,255,255,.03);
    }

    .btn-lock:hover{
      background:rgba(255,255,255,.08);
      color:#fff;
      box-shadow:none;
    }

    .btn-premium{
      border-color:var(--yellow);
      color:var(--yellow);
    }

    .btn-premium:hover:not(:disabled){
      background:var(--yellow);
      color:#000;
      box-shadow:0 0 18px rgba(255,212,0,.35);
    }

    .btn-voltar{
      border-color:#666;
      color:#ddd;
    }

    .btn-voltar:hover:not(:disabled){
      background:#333;
      color:#fff;
      box-shadow:none;
    }

    .btn.correct{
      background:var(--green)!important;
      border-color:var(--green)!important;
      color:#000!important;
    }

    .btn.wrong{
      background:var(--red)!important;
      border-color:var(--red)!important;
      color:#fff!important;
    }

    .grid-areas{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:14px;
      margin-top:18px;
    }

    .card-area{
      background:linear-gradient(135deg, rgba(0,243,255,.08), rgba(255,0,230,.08));
      border:1px solid rgba(0,243,255,.16);
      border-radius:16px;
      padding:16px;
      text-align:left;
      min-width:0;
    }

    .card-area.locked{
      background:linear-gradient(135deg, rgba(107,114,128,.10), rgba(55,65,81,.12));
      border-color:rgba(107,114,128,.25);
    }

    .card-area h3{
      color:var(--blue);
      margin-bottom:8px;
      font-size:1.12rem;
      line-height:1.35;
      word-break:break-word;
    }

    .card-area.locked h3{
      color:#d1d5db;
    }

    .card-area p{
      color:#ddd;
      font-size:.95rem;
      line-height:1.45;
      margin-bottom:10px;
      word-break:break-word;
    }

    .status{
      display:flex;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:18px;
      color:var(--pink);
      font-weight:bold;
      text-align:left;
    }

    #question-text{
      font-size:1.05rem;
      line-height:1.6;
      margin:20px 0;
      min-height:88px;
      text-align:left;
      word-break:break-word;
      overflow-wrap:anywhere;
    }

    .question-label{
      display:block;
      color:var(--yellow);
      font-weight:bold;
      margin-bottom:8px;
    }

    .text-base{
      display:block;
      background:rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.08);
      border-radius:12px;
      padding:14px;
      margin:10px 0 14px;
      color:#f5f5f5;
      font-style:italic;
      line-height:1.65;
    }

    .options-wrap{
      display:flex;
      flex-direction:column;
      gap:12px;
      margin-bottom:16px;
      width:100%;
      max-width:100%;
    }

    .option-btn{
      width:100%;
      max-width:100%;
      margin:0;
      text-align:left;
      min-height:58px;
    }

    .result-number{
      font-size:3rem;
      color:var(--blue);
      margin:12px 0;
      font-weight:900;
    }

    .result-sub{
      font-size:1.12rem;
      color:#ddd;
      margin-bottom:10px;
    }

    .mini{
      color:var(--muted);
      font-size:.96rem;
      line-height:1.5;
    }

    .lock-box{
      max-width:780px;
      margin:0 auto;
      background:linear-gradient(135deg, rgba(255,212,0,.10), rgba(255,0,230,.10));
      border:1px solid rgba(255,212,0,.25);
      border-radius:20px;
      padding:28px 18px;
      box-shadow:0 0 20px rgba(255,212,0,.12);
    }

    .lock-box h2{
      color:var(--yellow);
      font-size:2rem;
      margin-bottom:14px;
    }

    .lock-box p{
      color:#f3f4f6;
      line-height:1.6;
      margin-bottom:12px;
    }

    @media (max-width:700px){
      .grid-areas{
        grid-template-columns:1fr;
      }
      .box{
        padding:16px 12px;
      }
      #question-text{
        font-size:1rem;
      }
      .btn{
        font-size:.96rem;
        padding:13px 12px;
      }
    }
  </style>
</head>
<body>

<header>
  <h1>GEOGRAFIA TESTE GRÁTIS</h1>
  <p>2 MÓDULOS LIBERADOS • 10 QUESTÕES CADA • RESTANTE BLOQUEADO</p>
</header>

<div id="app"></div>

<audio id="audio-bg" loop preload="auto" playsinline>
  <source src="https://cdn.pixabay.com/download/audio/2022/01/18/audio_d0a13f69d2.mp3?filename=tension-103701.mp3" type="audio/mpeg">
</audio>

<audio id="audio-correct" preload="auto">
  <source src="https://cdn.pixabay.com/download/audio/2021/08/04/audio_0625c1539c.mp3?filename=success-1-6297.mp3" type="audio/mpeg">
</audio>

<audio id="audio-wrong" preload="auto">
  <source src="https://cdn.pixabay.com/download/audio/2021/08/04/audio_c6ccf3232f.mp3?filename=error-126627.mp3" type="audio/mpeg">
</audio>

<script>
const PREMIUM_URL = "COLE_AQUI_O_LINK_PREMIUM_DE_GEOGRAFIA";

const app = document.getElementById("app");
const audioBg = document.getElementById("audio-bg");
const audioCorrect = document.getElementById("audio-correct");
const audioWrong = document.getElementById("audio-wrong");

audioBg.volume = 0.06;
audioCorrect.volume = 0.45;
audioWrong.volume = 0.45;

let audioLiberado = false;
let areaAtual = "";
let questoesAtuais = [];
let indiceQuestao = 0;
let acertosObjetivas = 0;
let questaoRenderizadaAtual = null;

document.addEventListener("click", destravarAudio, { once: true });
document.addEventListener("touchstart", destravarAudio, { once: true });

function destravarAudio() {
  if (audioLiberado) return Promise.resolve(true);

  audioBg.muted = true;
  return audioBg.play()
    .then(() => {
      audioBg.pause();
      audioBg.currentTime = 0;
      audioBg.muted = false;
      audioLiberado = true;

      audioCorrect.play().then(() => {
        audioCorrect.pause();
        audioCorrect.currentTime = 0;
      }).catch(() => {});

      audioWrong.play().then(() => {
        audioWrong.pause();
        audioWrong.currentTime = 0;
      }).catch(() => {});

      return true;
    })
    .catch(() => false);
}

function tocarAudioFundo() {
  if (!audioLiberado) return;
  audioBg.currentTime = 0;
  audioBg.play().catch(() => {});
}

function pararAudioFundo() {
  audioBg.pause();
  audioBg.currentTime = 0;
}

function tocarAcerto() {
  audioCorrect.currentTime = 0;
  audioCorrect.play().catch(() => {});
}

function tocarErro() {
  audioWrong.currentTime = 0;
  audioWrong.play().catch(() => {});
}

const areas = [
  { nome: "Geografia Física", descricao: "Módulo liberado no teste grátis.", liberada: true },
  { nome: "Cartografia", descricao: "Módulo liberado no teste grátis.", liberada: true },
  { nome: "Climatologia", descricao: "Disponível apenas na versão premium.", liberada: false },
  { nome: "Geografia do Brasil", descricao: "Disponível apenas na versão premium.", liberada: false },
  { nome: "Geografia Humana", descricao: "Disponível apenas na versão premium.", liberada: false },
  { nome: "Geopolítica", descricao: "Disponível apenas na versão premium.", liberada: false },
  { nome: "Economia e Espaço Mundial", descricao: "Disponível apenas na versão premium.", liberada: false },
  { nome: "Meio Ambiente", descricao: "Disponível apenas na versão premium.", liberada: false },
  { nome: "Agrária e Urbana", descricao: "Disponível apenas na versão premium.", liberada: false },
  { nome: "Geografia no ENEM", descricao: "Disponível apenas na versão premium.", liberada: false }
];

function criarObjetiva(area, numero, textoBase, pergunta, alternativas, correta) {
  return {
    tipo: "objetiva",
    area,
    numero,
    base: textoBase,
    q: pergunta,
    o: alternativas,
    c: correta
  };
}

function gerarAreaBase(nomeArea, perguntasObjetivas) {
  return perguntasObjetivas.map((item, i) =>
    criarObjetiva(nomeArea, i + 1, item.base, item.q, item.o, item.c)
  );
}

function embaralharAlternativas(questao) {
  const pares = questao.o.map((texto, idx) => ({ texto, correta: idx === questao.c }));
  for (let i = pares.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pares[i], pares[j]] = [pares[j], pares[i]];
  }
  return {
    ...questao,
    opcoesRenderizadas: pares.map(p => p.texto),
    corretaRenderizada: pares.findIndex(p => p.correta)
  };
}

const bancoQuestoes = {
  "Geografia Física": gerarAreaBase(
    "Geografia Física",
    [
      {
        base:`"O relevo terrestre é resultado da ação conjunta de forças internas e externas que modelam a superfície do planeta."`,
        q:"As forças internas responsáveis por dobramentos, falhamentos e vulcanismo são chamadas de:",
        o:["Endógenas","Exógenas","Biológicas","Antrópicas"],
        c:0
      },
      {
        base:`"A erosão é um processo natural que desgasta e transporta materiais da superfície terrestre."`,
        q:"Quando a erosão é provocada principalmente pela água dos rios, ela é chamada de:",
        o:["Fluvial","Eólica","Glacial","Marinha"],
        c:0
      },
      {
        base:`"As placas tectônicas movimentam-se lentamente sobre o manto terrestre."`,
        q:"O encontro entre placas tectônicas pode provocar:",
        o:["Terremotos e vulcanismo","Aumento da fotossíntese","Formação de nuvens apenas","Redução da gravidade"],
        c:0
      },
      {
        base:`"O intemperismo altera rochas e minerais, preparando materiais para a formação dos solos."`,
        q:"O intemperismo químico ocorre principalmente por:",
        o:["Reações entre minerais, água e gases","Transporte de sedimentos pelo vento","Movimento de placas","Congelamento de rios"],
        c:0
      },
      {
        base:`"O solo resulta da decomposição das rochas somada à presença de matéria orgânica."`,
        q:"Um fator importante para a formação dos solos é:",
        o:["Clima e rocha matriz","Apenas latitude","Somente longitude","Fuso horário"],
        c:0
      },
      {
        base:`"A hidrografia estuda rios, lagos, águas subterrâneas e bacias hidrográficas."`,
        q:"Bacia hidrográfica é:",
        o:["Área drenada por um rio principal e seus afluentes","Região sem água superficial","Apenas o leito de um rio","Conjunto de oceanos"],
        c:0
      },
      {
        base:`"Os rios podem ser classificados conforme o regime de alimentação."`,
        q:"Um rio de regime pluvial é alimentado principalmente por:",
        o:["Chuvas","Neve derretida","Águas oceânicas","Água industrial"],
        c:0
      },
      {
        base:`"As planícies são formas de relevo geralmente associadas a áreas de deposição de sedimentos."`,
        q:"Uma característica das planícies é:",
        o:["Baixa altitude relativa e deposição sedimentar","Altitude sempre superior a 3.000 metros","Predomínio exclusivo de vulcões ativos","Ausência de rios"],
        c:0
      },
      {
        base:`"A latitude interfere na distribuição de energia solar na Terra."`,
        q:"Áreas próximas à Linha do Equador recebem:",
        o:["Maior incidência de radiação solar ao longo do ano","Menor radiação que os polos","Neve constante","Ausência de luz solar"],
        c:0
      },
      {
        base:`"A ação humana pode intensificar processos naturais de degradação do relevo e dos solos."`,
        q:"O desmatamento pode ampliar:",
        o:["Erosão e perda de solo fértil","Formação de geleiras","Redução total das enxurradas","Criação natural de petróleo"],
        c:0
      }
    ]
  ),

  "Cartografia": gerarAreaBase(
    "Cartografia",
    [
      {
        base:`"A cartografia permite representar a superfície terrestre em mapas, cartas e plantas."`,
        q:"A principal função de um mapa é:",
        o:["Representar o espaço geográfico de forma reduzida","Substituir totalmente o território real","Mostrar apenas oceanos","Eliminar informações espaciais"],
        c:0
      },
      {
        base:`"A escala indica a relação entre a distância no mapa e a distância real no terreno."`,
        q:"Em uma escala 1:100.000, 1 cm no mapa representa:",
        o:["100.000 cm na realidade","100.000 km na realidade","1 metro na realidade","1 milímetro na realidade"],
        c:0
      },
      {
        base:`"As coordenadas geográficas são formadas por latitude e longitude."`,
        q:"A latitude é medida a partir da:",
        o:["Linha do Equador","Linha Internacional da Data","Longitude de Greenwich","Trópico de Capricórnio"],
        c:0
      },
      {
        base:`"A longitude é medida a partir do Meridiano de Greenwich."`,
        q:"A longitude varia de:",
        o:["0° a 180° para leste ou oeste","0° a 90° norte ou sul","0° a 360° norte","90° a 180° sul"],
        c:0
      },
      {
        base:`"Os paralelos são linhas imaginárias horizontais que circundam a Terra."`,
        q:"O principal paralelo é:",
        o:["Linha do Equador","Meridiano de Greenwich","Linha Internacional da Data","Círculo Polar Lunar"],
        c:0
      },
      {
        base:`"Os meridianos são linhas imaginárias que ligam os polos."`,
        q:"O principal meridiano é:",
        o:["Greenwich","Equador","Trópico de Câncer","Trópico de Capricórnio"],
        c:0
      },
      {
        base:`"A orientação geográfica utiliza pontos cardeais e colaterais."`,
        q:"Os pontos cardeais são:",
        o:["Norte, Sul, Leste e Oeste","Norte, Nordeste, Centro e Sul","Leste, Sudeste, Norte e Plano","Oceano, relevo, clima e solo"],
        c:0
      },
      {
        base:`"A rosa dos ventos auxilia na orientação espacial."`,
        q:"O ponto cardeal onde o Sol nasce aproximadamente é:",
        o:["Leste","Oeste","Norte","Sul"],
        c:0
      },
      {
        base:`"Os fusos horários foram criados com base no movimento de rotação da Terra."`,
        q:"A Terra possui oficialmente:",
        o:["24 fusos horários principais","12 fusos horários principais","6 fusos horários principais","48 fusos horários principais"],
        c:0
      },
      {
        base:`"Projeções cartográficas são formas de representar a superfície curva da Terra em um plano."`,
        q:"Toda projeção cartográfica apresenta:",
        o:["Algum tipo de distorção","Representação perfeita da Terra","Ausência de escala","Eliminação dos continentes"],
        c:0
      }
    ]
  )
};

function irParaPremium() {
  window.location.href = PREMIUM_URL;
}

function mostrarMenu() {
  pararAudioFundo();

  app.innerHTML = `
    <div class="box">
      <h2 style="color:var(--blue); margin-bottom:8px;">Escolha um módulo de Geografia</h2>
      <p class="mini">No teste grátis você libera <strong>2 módulos</strong>. Os demais ficam bloqueados para levar ao premium.</p>

      <div class="grid-areas">
        ${areas.map(area => `
          <div class="card-area ${area.liberada ? "" : "locked"}">
            <h3>${area.liberada ? area.nome : "🔒 " + area.nome}</h3>
            <p>${area.descricao}</p>
            <button class="btn ${area.liberada ? "" : "btn-lock"}" onclick="${area.liberada ? `iniciarArea('${area.nome.replace(/'/g, "\\'")}')` : `mostrarBloqueio()`}">
              ${area.liberada ? "Entrar neste módulo" : "Desbloquear no premium"}
            </button>
          </div>
        `).join("")}
      </div>
    </div>
  `;
}

function mostrarBloqueio() {
  pararAudioFundo();

  app.innerHTML = `
    <div class="lock-box">
      <h2>🔒 MÓDULO PREMIUM</h2>
      <p>Esse módulo está disponível apenas na versão completa do simulado de Geografia.</p>
      <p>No premium você desbloqueia todos os módulos e continua seu treinamento completo com 200 questões.</p>
      <button class="btn btn-premium" onclick="irParaPremium()">LIBERAR ACESSO COMPLETO</button>
      <button class="btn btn-voltar" onclick="mostrarMenu()">VOLTAR AO MENU</button>
    </div>
  `;
}

async function iniciarArea(nomeArea) {
  await destravarAudio();
  areaAtual = nomeArea;
  questoesAtuais = bancoQuestoes[nomeArea] || [];
  indiceQuestao = 0;
  acertosObjetivas = 0;
  questaoRenderizadaAtual = null;

  if (!questoesAtuais.length) {
    app.innerHTML = `
      <div class="box">
        <h2 style="color:var(--red);">Erro ao abrir o módulo</h2>
        <button class="btn btn-voltar" onclick="mostrarMenu()">Voltar ao menu</button>
      </div>
    `;
    return;
  }

  setTimeout(() => {
    tocarAudioFundo();
  }, 120);

  carregarQuestao();
}

function montarEnunciado(questao) {
  return `
    <span class="question-label">Base para interpretação:</span>
    <span class="text-base">${questao.base}</span>
    <span class="question-label">Pergunta:</span>
    ${questao.q}
  `;
}

function carregarQuestao() {
  const questao = questoesAtuais[indiceQuestao];
  const total = questoesAtuais.length;
  questaoRenderizadaAtual = embaralharAlternativas(questao);

  let html = `
    <div class="box">
      <div class="status">
        <span>${areaAtual}</span>
        <span>Questão ${indiceQuestao + 1}/${total}</span>
      </div>
      <div id="question-text">${montarEnunciado(questaoRenderizadaAtual)}</div>
      <div class="options-wrap">
  `;

  questaoRenderizadaAtual.opcoesRenderizadas.forEach((alt, idx) => {
    html += `<button class="btn option-btn" onclick="responderObjetiva(${idx})">${alt}</button>`;
  });

  html += `
      </div>
      <button class="btn btn-voltar" onclick="mostrarMenu()">Voltar ao menu</button>
    </div>
  `;

  app.innerHTML = html;
}

function responderObjetiva(escolhida) {
  const botoes = document.querySelectorAll(".option-btn");
  const correta = questaoRenderizadaAtual.corretaRenderizada;

  botoes.forEach((btn, idx) => {
    btn.disabled = true;
    if (idx === correta) btn.classList.add("correct");
  });

  if (escolhida === correta) {
    acertosObjetivas++;
    tocarAcerto();
  } else {
    botoes[escolhida].classList.add("wrong");
    tocarErro();
  }

  setTimeout(() => {
    indiceQuestao++;
    if (indiceQuestao < questoesAtuais.length) {
      carregarQuestao();
    } else {
      finalizarArea();
    }
  }, 900);
}

function finalizarArea() {
  pararAudioFundo();

  const notaFinal = acertosObjetivas * 10;
  const totalPossivel = 200;

  let feedback = "Você concluiu apenas uma parte do simulado completo (200 pontos). Desbloqueie o premium para acessar todos os módulos de Geografia.";

  if (notaFinal >= 80) {
    feedback += " Ótimo resultado no teste grátis. Você já pode avançar para o premium.";
  } else if (notaFinal >= 50) {
    feedback += " Bom começo. No premium você treina o restante dos módulos.";
  } else {
    feedback += " Esse teste já mostrou onde melhorar. O premium ajuda a evoluir com treino completo.";
  }

  app.innerHTML = `
    <div class="box">
      <h2 style="color:var(--blue);">${areaAtual}</h2>
      <div class="result-number">${notaFinal}/${totalPossivel}</div>
      <div class="result-sub">Acertos: ${acertosObjetivas}/10</div>
      <p class="mini" style="margin-bottom:18px;">${feedback}</p>

      <button class="btn btn-premium" onclick="irParaPremium()">DESBLOQUEAR VERSÃO COMPLETA</button>
      <button class="btn" onclick="iniciarArea('${areaAtual.replace(/'/g, "\\'")}')">Refazer este módulo</button>
